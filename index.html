<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pixel Todo</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"><script defer="defer" src="main.js"></script></head><body><div class="titlebar"><div class="titlebar-controls"><div class="titlebar-dot red"></div><div class="titlebar-dot yellow"></div><div class="titlebar-dot green"></div></div><div class="titlebar-name">PIXEL TODO</div><div class="titlebar-version">FirstAndOnlyVersion :D</div></div><div class="app"><div class="explorer"><div class="explorer-header"><span class="explorer-title">Explorer</span><button class="btn-icon" id="btnAddProject">+ project</button></div><div class="explorer-body" id="explorerBody"></div></div><div class="main"><div class="main-header"><div id="mainActions"></div></div><div class="main-body" id="mainBody"></div></div></div><div class="modal-overlay" id="addProjectModal"><div class="modal"><div class="modal-title">// new project</div><label class="prop-label">Project Name</label> <input class="prop-input" id="newProjectName" placeholder="e.g. Personal" style="width:100%;"/><div class="modal-actions"><button class="btn-cancel" id="btnCancelProject">[ cancel ]</button> <button class="btn-confirm" id="btnConfirmProject">[ create ]</button></div></div></div><div class="modal-overlay" id="addTodoModal"><div class="modal"><div class="modal-title">// new task</div><label class="prop-label">Task Title</label> <input class="prop-input" id="newTodoTitle" placeholder="e.g. Buy groceries" style="width:100%;"/><div class="modal-actions"><button class="btn-cancel" id="btnCancelTodo">[ cancel ]</button> <button class="btn-confirm" id="btnConfirmTodo">[ create ]</button></div></div></div></body></html>
